name: Deploy Docs
on:
  push:
    branches: [main]

jobs:
  deploy-harbor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: DOCS_BRAND=harbor npm run build -- --out-dir build-harbor
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: aws s3 sync build-harbor/ s3://help.practiceharbor.com --delete
      - run: aws cloudfront create-invalidation --distribution-id EKIDPG7IQAD3R --paths '/*'

  deploy-progressnotes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: aws s3 sync build/ s3://help.progressnotes.app --delete
      - run: aws cloudfront create-invalidation --distribution-id E2H5M8SGH7KN9L --paths '/*'
